<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FTGames ScriptView</title>

    <link rel="icon" href="images/favicon.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{
            --bg:#05080d;
            --card:#111827cc;
            --cyan:#00e5ff;
            --green:#00ff99;
            --text:#f8fafc;
        }

        body{
            font-family:'Space Grotesk',sans-serif;
            background:
                radial-gradient(circle at top,#122235 0%,#08111b 45%,#000 100%);
            color:var(--text);
            min-height:100vh;
            padding:40px;
        }

        .container{
            max-width:1350px;
            margin:auto;
            padding:35px;
            background:rgba(17,24,39,.72);
            backdrop-filter:blur(18px);
            border:1px solid rgba(0,229,255,.18);
            border-radius:24px;
            box-shadow:
                0 0 35px rgba(0,229,255,.15),
                inset 0 0 15px rgba(255,255,255,.03);
        }

        .header{
            display:flex;
            align-items:center;
            gap:20px;
            margin-bottom:30px;
        }

        .logo{
            width:70px;
            height:70px;
            border-radius:18px;
            background:#0b1220;
            border:2px solid var(--cyan);
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow:0 0 20px rgba(0,229,255,.25);
        }

        .logo img{
            width:48px;
            height:48px;
        }

        h1{
            font-size:3rem;
            font-weight:700;
            background:linear-gradient(90deg,var(--cyan),var(--green),var(--cyan));
            background-size:200%;
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            animation:gradient 6s linear infinite;
        }

        .subtitle{
            color:#94a3b8;
            margin-top:5px;
        }

        @keyframes gradient{
            from{background-position:0%;}
            to{background-position:200%;}
        }

        #preview{
            width:100%;
            height:500px;
            border:none;
            border-radius:18px;
            background:white;
            margin-bottom:25px;
            box-shadow:0 0 30px rgba(0,229,255,.18);
        }

        textarea{
            width:100%;
            height:320px;
            resize:vertical;
            border:none;
            border-radius:18px;
            background:#0f172a;
            color:#f8fafc;
            padding:20px;
            font-size:15px;
            font-family:Consolas,monospace;
            line-height:1.6;
            outline:none;
            box-shadow:
                inset 0 0 0 2px rgba(0,229,255,.22),
                0 0 15px rgba(0,229,255,.08);
        }

        textarea:focus{
            box-shadow:
                inset 0 0 0 2px var(--cyan),
                0 0 25px rgba(0,229,255,.45);
        }

        .toolbar{
            display:flex;
            gap:15px;
            flex-wrap:wrap;
            margin-top:20px;
        }

        button{
            padding:14px 28px;
            border:none;
            border-radius:14px;
            cursor:pointer;
            font-size:16px;
            font-weight:700;
            color:#001b18;
            background:linear-gradient(135deg,var(--cyan),var(--green));
            transition:.25s;
            box-shadow:0 0 18px rgba(0,229,255,.25);
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:
                0 0 30px rgba(0,229,255,.5),
                0 0 50px rgba(0,255,153,.2);
        }

        .footer{
            margin-top:25px;
            text-align:center;
            color:#64748b;
            font-size:.95rem;
        }

        @media(max-width:900px){

            body{
                padding:20px;
            }

            .header{
                flex-direction:column;
                text-align:center;
            }

            h1{
                font-size:2.2rem;
            }

            #preview{
                height:350px;
            }

            textarea{
                height:240px;
            }

        }

    </style>
</head>
<body>

<div class="container">

    <div class="header">

        <div class="logo">
            <img src="images/favicon.png" alt="FTGames">
        </div>

        <div>
            <h1>FTGames ScriptView</h1>
            <div class="subtitle">
                Build • Preview • Test HTML instantly
            </div>
        </div>

    </div>

    <iframe id="preview"></iframe>

    <textarea id="editor"><!DOCTYPE html>
<html>
<head>
<style>
body{
    font-family:Arial,sans-serif;
    padding:30px;
}
h1{
    color:#00e5ff;
}
</style>
</head>
<body>

<h1>Welcome to FTGames ScriptView!</h1>
<p>Start creating amazing web pages...</p>

</body>
</html></textarea>

    <div class="toolbar">
        <button onclick="runCode()">▶ Run</button>
        <button onclick="copyCode()">📋 Copy</button>
        <button onclick="downloadCode()">💾 Download</button>
    </div>

    <div class="footer">
        FTGames ScriptView • HTML Live Preview
    </div>

</div>

<script>

function runCode(){
    const code=document.getElementById("editor").value;
    const iframe=document.getElementById("preview");
    const doc=iframe.contentWindow.document;
    doc.open();
    doc.write(code);
    doc.close();
}

function copyCode(){
    navigator.clipboard.writeText(document.getElementById("editor").value);
    alert("Code copied!");
}

function downloadCode(){
    const blob=new Blob([document.getElementById("editor").value],{type:"text/html"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="index.html";
    a.click();
    URL.revokeObjectURL(a.href);
}

document.getElementById("editor").addEventListener("keydown",function(e){
    if(e.ctrlKey && e.key==="Enter"){
        runCode();
    }
});

runCode();

</script>

<script src="/analytics-consent.js"></script>

</body>
</html>
