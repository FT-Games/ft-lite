<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FT Prime Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Montserrat', sans-serif;
}

body {
    background: #000;
    color: gold;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 90%;
    max-width: 500px;
    border: 2px solid gold;
    padding: 40px;
    text-align: center;
}

.crown {
    font-size: 70px;
    margin-bottom: 10px;
}

h1 {
    font-size: 3rem;
    margin-bottom: 10px;
}

p {
    color: white;
    margin-bottom: 25px;
    line-height: 1.5;
}

.discord-btn {
    display: inline-block;
    background: gold;
    color: #5865F2;
    text-decoration: none;
    font-weight: bold;
    padding: 15px 30px;
    font-size: 18px;
}

.discord-btn:hover {
    opacity: 0.9;
}
</style>
</head>
<body>

<div class="card">
    <div class="crown">👑</div>

    <h1>FT Prime</h1>

    <p>
        Login with Discord to access FT Prime content and subscriber perks.
    </p>

    <a
        class="discord-btn"
        href="https://discord.com/oauth2/authorize?client_id=1516700008508948572&response_type=code&redirect_uri=https%3A%2F%2Fftgames.xyz%2Fprime%2Fauth.html&scope=identify"
    >
        Login with Discord
    </a>
</div>

</body>
</html>
