<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Instructions</title>
  <style>
    body {
      margin: 0;
      padding: 30px 16px;
      font-family: Arial, sans-serif;
      background: #0f0f12;
      color: #f5f5f5;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 28px;
      color: #00e5ff;
    }

    .step {
      margin-bottom: 40px;
      background: #1b1b22;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }

    .step img {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      margin-bottom: 12px;
    }

    .step p {
      margin: 0;
      line-height: 1.6;
      font-size: 16px;
      color: #e6e6e6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>How to Start Game</h1>

    <section class="step">
      <img src="../2d_platformer/instructions/step1.png" alt="Step 1">
      <p>
        <strong>Step 1:</strong> Click on this button in the top bar of the tutorial level. Or you can beat it if you want to.
      </p>
    </section>

    <section class="step">
      <img src="../2d_platformer/instructions/step2.png" alt="Step 2">
      <p>
        <strong>Step 2:</strong> Click on the last "cartridge" in the game select menu to start the game.
      </p>
    </section>
  </div>
</body>
</html>
