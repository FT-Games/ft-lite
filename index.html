<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Totally Math Lessons</title>


<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}


body{

font-family:"Segoe UI",Arial,sans-serif;

background:linear-gradient(
135deg,
#fffbd6,
#ffe0a3
);

color:#4b3000;

}



header{

text-align:center;

padding:40px 20px;

}


header h1{

font-size:48px;

background:linear-gradient(
90deg,
#ff9800,
#ffb300,
#ff6f00
);

-webkit-background-clip:text;

color:transparent;

}



header p{

font-size:20px;

}



.container{

max-width:1200px;

margin:auto;

padding:25px;

}



.box{

background:white;

border-radius:30px;

padding:35px;

box-shadow:
0 15px 40px rgba(0,0,0,.15);

}



h2{

color:#ff8500;

margin-bottom:25px;

}



.lesson-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(230px,1fr));

gap:20px;

}



.lesson-card{

background:#fff8e7;

border:3px solid #ffd166;

border-radius:25px;

padding:25px;

text-align:center;

cursor:pointer;

transition:.2s;

}



.lesson-card:hover{

transform:translateY(-8px);

background:#fff0c2;

}



.lesson-card h3{

color:#ff8500;

font-size:23px;

}



.lesson-card p{

margin-top:10px;

}



.hidden{

display:none;

}



.level-buttons{

display:flex;

gap:20px;

flex-wrap:wrap;

}



.level-button{

flex:1;

padding:25px;

border:none;

border-radius:25px;

background:#ffb300;

color:white;

font-size:22px;

cursor:pointer;

}



.level-button:hover{

background:#ff8500;

}



.slide-box{

background:#fff8e7;

border:3px solid #ffd166;

border-radius:25px;

padding:30px;

font-size:20px;

line-height:1.6;

min-height:260px;

}



.controls{

display:flex;

gap:20px;

margin-top:25px;

}



button{

background:#ffb300;

border:none;

color:white;

padding:15px;

border-radius:20px;

font-size:18px;

cursor:pointer;

flex:1;

}



button:hover{

background:#ff8500;

}



.progress{

text-align:center;

margin-top:20px;

font-weight:bold;

}



</style>

</head>


<body>


<header>

<h1>📚 Totally Math Lessons</h1>

<p>Choose a topic and improve your maths!</p>

</header>



<div class="container">

<div class="box">



<!-- LESSON CHOICE -->


<div id="lessonPage">

<h2>📖 Choose a Lesson</h2>

<div class="lesson-grid" id="lessonCards">

</div>

</div>





<!-- LEVEL CHOICE -->


<div id="levelPage" class="hidden">


<h2 id="levelTitle">

Choose Skill Level

</h2>



<div class="level-buttons">


<button class="level-button"
onclick="startLesson('beginner')">

🟢 Beginner

</button>



<button class="level-button"
onclick="startLesson('intermediate')">

🟡 Intermediate

</button>



<button class="level-button"
onclick="startLesson('advanced')">

🔴 Advanced

</button>


</div>



<br>


<button onclick="backLessons()">

⬅ Back to Lessons

</button>


</div>





<!-- LESSON VIEW -->


<div id="lessonView" class="hidden">


<h2 id="lessonName"></h2>


<div class="slide-box" id="slideContent">

</div>


<div class="progress" id="progress">

</div>


<div class="controls">


<button onclick="previousSlide()">

⬅ Previous

</button>


<button onclick="nextSlide()">

Next ➡

</button>


</div>


</div>



</div>

</div>

let selectedLesson=0;
let currentSlide=0;
let currentLevel="beginner";



function createCards(){

let box=document.getElementById("lessonCards");

lessons.forEach((lesson,index)=>{

let card=document.createElement("div");

card.className="lesson-card";

card.innerHTML=
`
<h3>${lesson.title}</h3>
<p>${lesson.desc}</p>
`;


card.onclick=function(){

selectedLesson=index;

document.getElementById("lessonPage").classList.add("hidden");

document.getElementById("levelPage").classList.remove("hidden");


document.getElementById("levelTitle").innerHTML=
lesson.title+"<br>Choose Skill Level";

};


box.appendChild(card);

});

}



function startLesson(level){

currentLevel=level;

currentSlide=0;


document.getElementById("levelPage").classList.add("hidden");

document.getElementById("lessonView").classList.remove("hidden");


showSlide();

}



function showSlide(){

let lesson=lessons[selectedLesson];

let slides=lesson.slides[currentLevel];


document.getElementById("lessonName").innerHTML=
lesson.title+" - "+currentLevel;


document.getElementById("slideContent").innerHTML=
slides[currentSlide];


document.getElementById("progress").innerHTML=
"Slide "+(currentSlide+1)+" / "+slides.length;

}



function nextSlide(){

let slides=
lessons[selectedLesson].slides[currentLevel];


currentSlide++;


if(currentSlide>=slides.length){

currentSlide=0;

}


showSlide();

}



function previousSlide(){

let slides=
lessons[selectedLesson].slides[currentLevel];


currentSlide--;


if(currentSlide<0){

currentSlide=slides.length-1;

}


showSlide();

}



function backLessons(){

document.getElementById("levelPage").classList.add("hidden");

document.getElementById("lessonPage").classList.remove("hidden");

}



createCards();
