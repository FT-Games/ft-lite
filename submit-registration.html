<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Registration - Totally Math</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111827;
            color: #f9fafb;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 24px;
        }

        h1 {
            margin: 0 0 16px;
            color: #86efac;
        }

        dl {
            margin: 0;
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 10px 12px;
        }

        dt {
            font-weight: 700;
            color: #d1d5db;
        }

        dd {
            margin: 0;
            word-break: break-word;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111827;
            color: #f9fafb;
            padding: 20px;
        }

        .notice {
            width: 100%;
            max-width: 520px;
            background: #92400e;
            border: 1px solid #fbbf24;
            color: #fef3c7;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-sizing: border-box;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="notice">
        <strong>⚠</strong> This is a test version of FT Accounts. No data has been submitted. <strong>⚠</strong>
    </div>
    <main class="card">
        <h1 id="statusTitle">Uh... that's an error.</h1>
        <dl id="details"></dl>
    </main>

    <script>
        const STORAGE_KEY = "ftgames:pendingRegistration";
        let registrationData = {};
        try {
            registrationData = JSON.parse(sessionStorage.getItem(STORAGE_KEY) || "{}");
        } catch (e) {
            registrationData = {};
        }
        sessionStorage.removeItem(STORAGE_KEY);

        const username = registrationData.username || "";
        const email = registrationData.email || "";
        const pass = registrationData.pass || "";
        const gender = registrationData.gender || "";

        const hasData = username || email || pass || gender;
        const title = document.getElementById("statusTitle");
        const details = document.getElementById("details");

        if (hasData) {
            document.title = "Data received";
            title.textContent = "Data received";

            const rows = [
                ["Username", username],
                ["Email", email],
                ["Pass", pass],
                ["Gender", gender]
            ];

            rows.forEach(([label, value]) => {
                const term = document.createElement("dt");
                const description = document.createElement("dd");
                term.textContent = label;
                description.textContent = value || "-";
                details.append(term, description);
            });
        } else {
            details.innerHTML = "<dt>Status</dt><dd>No registration data provided.</dd>";
        }
    </script>
</body>
</html>
