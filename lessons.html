<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Totally Math Lessons</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
font-family:"Segoe UI",Arial,sans-serif;
background:linear-gradient(135deg,#fffbd6,#ffe0a3);
color:#4b3000;

}


header{

text-align:center;
padding:35px;

}


header h1{

font-size:48px;
margin:0;

background:linear-gradient(
90deg,
#ff9800,
#ffb300,
#ff6f00
);

-webkit-background-clip:text;
color:transparent;

}


header p{

font-size:20px;

}



.container{

max-width:1100px;
margin:auto;
padding:20px;

}



.card{

background:white;
border-radius:30px;
padding:35px;
box-shadow:0 15px 40px #0003;

}



h2{

color:#ff8c00;

}



/* LESSON CARDS */


.lesson-grid{

display:grid;
grid-template-columns:repeat(
auto-fit,
minmax(220px,1fr)
);

gap:20px;

}



.lesson-card{

background:#fff8e7;
border:3px solid #ffd166;
border-radius:25px;
padding:25px;

cursor:pointer;
transition:.25s;

text-align:center;

}



.lesson-card:hover{

transform:translateY(-8px);
background:#fff0c2;

}



.lesson-card h3{

color:#ff8500;
font-size:25px;

}



.lesson-card p{

font-size:16px;

}



/* LEVEL PAGE */


.level-buttons{

display:flex;
gap:20px;
flex-wrap:wrap;

}



.level-btn{

flex:1;
min-width:200px;

padding:25px;

border-radius:25px;
border:none;

font-size:22px;
cursor:pointer;

background:#ffb300;
color:white;

}



.level-btn:hover{

background:#ff8500;

}




/* LESSON VIEWER */


.slide-box{

background:#fff8e7;
border:3px solid #ffd166;

border-radius:25px;

padding:30px;

font-size:20px;

line-height:1.6;

min-height:250px;

}



.buttons{

display:flex;
gap:15px;
margin-top:25px;

}


button{

padding:15px;

border:none;

border-radius:18px;

background:#ffb300;

color:white;

font-size:18px;

cursor:pointer;

flex:1;

}


button:hover{

background:#ff8500;

}



.progress{

text-align:center;

font-weight:bold;

margin-top:20px;

}




.hidden{

display:none;

}




@media(max-width:600px){

header h1{

font-size:35px;

}


.level-buttons,
.buttons{

flex-direction:column;

}

}


</style>


</head>



<body>


<header>

<h1>📚 Totally Math Lessons</h1>

<p>Choose a lesson and start learning!</p>

</header>



<div class="container">



<div class="card">


<!-- LESSON SELECT PAGE -->


<div id="lessonPage">


<h2>
📖 Choose a Lesson
</h2>


<div class="lesson-grid" id="lessonCards">

</div>


</div>





<!-- LEVEL SELECT PAGE -->


<div id="levelPage" class="hidden">


<h2 id="selectedLesson">
Choose Skill Level
</h2>


<p>
Choose how difficult you want the lesson to be:
</p>



<div class="level-buttons">


<button class="level-btn"
onclick="startLesson('beginner')">

🟢 Beginner

</button>



<button class="level-btn"
onclick="startLesson('intermediate')">

🟡 Intermediate

</button>



<button class="level-btn"
onclick="startLesson('advanced')">

🔴 Advanced

</button>


</div>


<br>


<button onclick="backToLessons()">

⬅ Back to Lessons

</button>


</div>





<!-- LESSON VIEW PAGE -->


<div id="lessonView" class="hidden">


<h2 id="lessonTitle">

</h2>



<div class="slide-box" id="slideContent">

</div>



<div class="progress" id="progress">

</div>



<div class="buttons">


<button onclick="previousSlide()">

⬅ Previous

</button>


<button onclick="nextSlide()">

Next ➡

</button>


</div>


</div>



</div>

</div>
