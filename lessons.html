<script>

const lessons = [

{
title:"Numbers & Place Value",
slides:{
beginner:[
"Numbers are the foundation of maths.<br><br>We use numbers to count things.",
"Place value tells us what each digit means.<br><br>Example: 542 = 500 + 40 + 2",
"Try it:<br><br>What does the 7 mean in 7,321?"
],

intermediate:[
"Numbers can be broken into thousands, hundreds, tens and ones.",
"Example:<br><br>6,482 = 6000 + 400 + 80 + 2",
"Challenge:<br><br>Write 9,305 using expanded form."
],

advanced:[
"Place value can extend into decimals and large numbers.",
"Example:<br><br>0.582 has tenths, hundredths and thousandths.",
"Challenge:<br><br>Compare the value of digits in 45,678."
]
]
},


{
title:"Addition",
slides:{
beginner:[
"Addition means putting groups together.",
"Example:<br><br>5 + 3 = 8",
"Try adding small numbers together."
],

intermediate:[
"Addition can use carrying when numbers get bigger.",
"Example:<br><br>248 + 176",
"Remember to line up place values."
],

advanced:[
"Advanced addition can involve decimals and large numbers.",
"Always keep decimal points aligned.",
"Check answers using estimation."
]
]
},


{
title:"Subtraction",
slides:{
beginner:[
"Subtraction means taking something away.",
"Example:<br><br>10 - 4 = 6",
"The answer is called the difference."
],

intermediate:[
"Large subtraction may require borrowing.",
"Example:<br><br>502 - 278",
"Work from right to left."
],

advanced:[
"Subtraction can include negatives and decimals.",
"Remember subtraction is the opposite of addition.",
"Use checking to verify your answer."
]
]
},


{
title:"Multiplication",
slides:{
beginner:[
"Multiplication is repeated addition.",
"Example:<br><br>3 × 4 means 3 groups of 4.",
"Learn your times tables."
],

intermediate:[
"Multiplication uses written methods for larger numbers.",
"Example:<br><br>24 × 6",
"Break numbers apart to solve faster."
],

advanced:[
"Advanced multiplication includes algebra and powers.",
"Example:<br><br>x × x = x²",
"Look for patterns."
]
]
},


{
title:"Division",
slides:{
beginner:[
"Division splits things into equal groups.",
"Example:<br><br>12 ÷ 3 = 4",
"Division is sharing equally."
],

intermediate:[
"Division can include remainders.",
"Example:<br><br>13 ÷ 4 = 3 remainder 1",
"Check using multiplication."
],

advanced:[
"Advanced division can include fractions and algebra.",
"Use inverse operations to solve.",
"Be careful with decimals."
]
]
}

];

let currentLesson = 0;
let currentSlide = 0;
let difficulty = "beginner";
    // CONTINUING LESSON DATABASE

lessons.push(

{
title:"Fractions",
slides:{
beginner:[
"Fractions show parts of a whole.",
"Example:<br><br>1/2 means one out of two equal parts.",
"Fractions have a top number and bottom number."
],
intermediate:[
"Fractions can be added and simplified.",
"Example:<br><br>2/4 = 1/2",
"Find common denominators when adding."
],
advanced:[
"Fractions can be used in algebra and complex equations.",
"Remember multiplication and division rules.",
"Convert between fractions, decimals and percentages."
]
}
},

{
title:"Decimals",
slides:{
beginner:[
"Decimals show parts of whole numbers.",
"Example:<br><br>0.5 means half.",
"Decimals use place value."
],
intermediate:[
"Decimals can be added, subtracted and multiplied.",
"Line up decimal points carefully.",
"Example: 2.5 + 1.3 = 3.8"
],
advanced:[
"Decimals can represent very small measurements.",
"Use rounding and estimation.",
"Decimals connect with percentages and fractions."
]
}
},

{
title:"Percentages",
slides:{
beginner:[
"Percent means out of 100.",
"Example:<br><br>50% = 50 out of 100.",
"Percentages show parts of a group."
],
intermediate:[
"Percentages can be converted into decimals.",
"Example:<br><br>25% = 0.25",
"Use percentages for discounts."
],
advanced:[
"Percentage change compares increases and decreases.",
"Formula: change ÷ original × 100",
"Used in finance and statistics."
]
}
},

{
title:"Geometry",
slides:{
beginner:[
"Geometry is the study of shapes.",
"Shapes have sides, corners and angles.",
"Examples include circles and triangles."
],
intermediate:[
"Geometry uses formulas to find measurements.",
"Learn properties of different shapes.",
"Angles are important in geometry."
],
advanced:[
"Advanced geometry uses proofs and theorems.",
"Shapes can be transformed and analysed.",
"Geometry is used in engineering."
]
}
},

{
title:"Algebra",
slides:{
beginner:[
"Algebra uses letters for unknown numbers.",
"Example:<br><br>x + 3 = 7",
"The goal is finding x."
],
intermediate:[
"Algebra uses multiple steps.",
"Example:<br><br>2x + 4 = 10",
"Undo operations to solve."
],
advanced:[
"Advanced algebra includes equations and functions.",
"Variables can represent many values.",
"Use algebra rules carefully."
]
}
},

{
title:"Coordinates",
slides:{
beginner:[
"Coordinates show positions on a grid.",
"They are written like (x,y).",
"The first number moves sideways."
],
intermediate:[
"Coordinates can describe shapes.",
"Graphs use x and y axes.",
"Plot points carefully."
],
advanced:[
"Coordinate geometry uses formulas.",
"Lines and distances can be calculated.",
"Used in computer graphics."
]
}

}

);


// LESSON DROPDOWN

function createLessonMenu(){

let menu=document.getElementById("lessonSelect");

menu.innerHTML="";


lessons.forEach((lesson,index)=>{

let option=document.createElement("option");

option.value=index;

option.innerHTML=
(index+1)+". "+lesson.title;

menu.appendChild(option);

});

menu.value=currentLesson;

}


// CHANGE LESSON

function changeLesson(){

currentLesson=
Number(
document.getElementById("lessonSelect").value
);

currentSlide=0;

loadLesson();

}


// CHANGE DIFFICULTY

document
.getElementById("level")
.addEventListener("change",function(){

difficulty=this.value;

localStorage.setItem(
"mathLevel",
difficulty
);

currentSlide=0;

loadLesson();

});

// LOAD LESSON

function loadLesson(){

let lesson = lessons[currentLesson];

let slides =
lesson.slides[difficulty];


document.getElementById("lessonTitle").innerHTML =
"Lesson "
+(currentLesson+1)
+": "
+lesson.title;



document.getElementById("slideContent").innerHTML =
slides[currentSlide];



document.getElementById("progress").innerHTML =
"Lesson "
+(currentLesson+1)
+" / "
+lessons.length
+
" &nbsp; | &nbsp; Slide "
+(currentSlide+1)
+" / "
+slides.length;



document.getElementById("lessonSelect").value =
currentLesson;



localStorage.setItem(
"mathLesson",
currentLesson
);


}




// NEXT BUTTON

function nextSlide(){

let slides =
lessons[currentLesson]
.slides[difficulty];


currentSlide++;


if(currentSlide >= slides.length){

currentSlide=0;

currentLesson++;


if(currentLesson >= lessons.length){

currentLesson=0;

}

}


loadLesson();

}





// PREVIOUS BUTTON

function previousSlide(){

currentSlide--;


if(currentSlide < 0){

currentLesson--;


if(currentLesson < 0){

currentLesson =
lessons.length-1;

}


currentSlide =
lessons[currentLesson]
.slides[difficulty]
.length-1;

}


loadLesson();

}





// LOAD SAVED SETTINGS

if(localStorage.getItem("mathLesson")){

currentLesson =
Number(
localStorage.getItem("mathLesson")
);

}


if(localStorage.getItem("mathLevel")){

difficulty =
localStorage.getItem("mathLevel");

document.getElementById("level").value =
difficulty;

}




// START WEBSITE

createLessonMenu();

updateLevel();

loadLesson();


</script>

</body>
</html>
