<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Totally Math Lessons</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:"Segoe UI",Arial,sans-serif;
    background:linear-gradient(135deg,#fffbd6,#ffe0a3);
    color:#4b3000;
}

header{
    text-align:center;
    padding:35px 20px 10px;
}

header h1{
    font-size:48px;
    margin:0;
    background:linear-gradient(90deg,#ff9800,#ffb300,#ff6f00);
    -webkit-background-clip:text;
    color:transparent;
}

header p{
    font-size:20px;
}


.container{
    max-width:950px;
    margin:auto;
    padding:25px;
}


.card{
    background:white;
    border-radius:30px;
    padding:35px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}


select{
    width:100%;
    padding:15px;
    border-radius:15px;
    border:2px solid #ffb300;
    font-size:18px;
    background:#fff8dc;
}


.lesson-title{
    font-size:32px;
    margin-top:25px;
    color:#ff8c00;
}


.slide-box{
    margin-top:20px;
    background:#fff8e7;
    border-radius:25px;
    padding:30px;
    min-height:260px;
    font-size:20px;
    line-height:1.6;
    border:3px solid #ffd166;
}


.controls{
    display:flex;
    justify-content:space-between;
    gap:15px;
    margin-top:25px;
}


button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:18px;
    background:#ffb300;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
}


button:hover{
    background:#ff8500;
    transform:scale(1.03);
}


.progress{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
    font-size:18px;
}


.level-box{
    margin-bottom:20px;
}


.badge{
    display:inline-block;
    background:#ffe082;
    padding:8px 15px;
    border-radius:20px;
    margin-top:10px;
}


@media(max-width:600px){

header h1{
    font-size:36px;
}

.card{
    padding:20px;
}

.controls{
    flex-direction:column;
}

}

</style>

</head>

<body>


<header>

<h1>📚 Totally Math Lessons</h1>

<p>Learn maths with interactive lessons!</p>

</header>



<div class="container">

<div class="card">


<div class="level-box">

<h2>Choose your knowledge level:</h2>

<select id="level">

<option value="beginner">
🟢 Beginner
</option>

<option value="intermediate">
🟡 Intermediate
</option>

<option value="advanced">
🔴 Advanced
</option>

</select>

</div>



<div class="badge" id="levelText">
Beginner Mode
</div>



<h2 class="lesson-title" id="lessonTitle">
Loading Lesson...
</h2>



<div class="slide-box" id="slideContent">

Loading...

</div>



<div class="progress" id="progress">

</div>



<div class="controls">

<button onclick="previousSlide()">
⬅ Previous
</button>


<button onclick="nextSlide()">
Next ➡
</button>


</div>


</div>

</div>

  <script>

const lessons = [

{
title:"Numbers & Place Value",
slides:[
"Numbers are the foundation of maths.<br><br>We use numbers to count, measure and compare things.",
"Place value tells us what each digit means.<br><br>Example: In 542, the 5 means 500.",
"Try it:<br><br>What is the value of the 7 in 7,321?"
]
},

{
title:"Addition",
slides:[
"Addition means putting groups together.",
"Example:<br><br>5 + 3 = 8<br><br>You started with 5 and added 3 more.",
"Challenge:<br><br>Try adding bigger numbers using columns."
]
},

{
title:"Subtraction",
slides:[
"Subtraction means taking something away.",
"Example:<br><br>10 - 4 = 6",
"Remember:<br><br>The answer in subtraction is called the difference."
]
},

{
title:"Multiplication",
slides:[
"Multiplication is repeated addition.",
"Example:<br><br>4 × 3 means 4 groups of 3.",
"Practice:<br><br>Learn your times tables to become faster."
]
},

{
title:"Division",
slides:[
"Division splits things into equal groups.",
"Example:<br><br>12 ÷ 3 = 4",
"Division is the opposite of multiplication."
]
},

{
title:"Fractions",
slides:[
"Fractions show parts of a whole.",
"Example:<br><br>1/2 means one out of two equal parts.",
"Fractions have a numerator and denominator."
]
},

{
title:"Decimals",
slides:[
"Decimals show numbers between whole numbers.",
"Example:<br><br>0.5 = one half",
"Decimals use place values like tenths and hundredths."
]
},

{
title:"Percentages",
slides:[
"Percent means 'out of 100'.",
"Example:<br><br>50% means 50 out of 100.",
"Percentages are useful for discounts and data."
]
},

{
title:"Geometry",
slides:[
"Geometry is the study of shapes.",
"Shapes have properties like sides, angles and corners.",
"Common shapes include triangles, squares and circles."
]
},

{
title:"Angles",
slides:[
"Angles measure turns.",
"A right angle is exactly 90 degrees.",
"Angles can be acute, right or obtuse."
]
},

{
title:"Perimeter",
slides:[
"Perimeter is the distance around a shape.",
"Add every side length together.",
"Example:<br>Square with sides of 5cm:<br>5+5+5+5=20cm"
]
},

{
title:"Area",
slides:[
"Area measures the space inside a shape.",
"Rectangle formula:<br><br>Length × Width",
"Area uses square units like cm²."
]
},

{
title:"Algebra",
slides:[
"Algebra uses letters for unknown numbers.",
"Example:<br><br>x + 5 = 10",
"The goal is finding what the letter represents."
]
},

{
title:"Equations",
slides:[
"An equation says two things are equal.",
"Example:<br><br>3x = 12",
"Solve by using opposite operations."
]
},

{
title:"Coordinates",
slides:[
"Coordinates locate points on a grid.",
"They are written as (x,y).",
"The first number moves sideways, the second moves up."
]
},

{
title:"Graphs",
slides:[
"Graphs display information visually.",
"Different graphs show different types of data.",
"Always read labels and scales carefully."
]
},

{
title:"Probability",
slides:[
"Probability measures how likely something is.",
"Impossible = 0<br>Certain = 1",
"Probability is often written as fractions or percentages."
]
},

{
title:"Statistics",
slides:[
"Statistics is collecting and analysing data.",
"Mean = average.",
"Median is the middle value."
]
},

{
title:"Patterns",
slides:[
"Patterns follow rules.",
"Example:<br>2,4,6,8...",
"The rule is adding 2 each time."
]
},

{
title:"Negative Numbers",
slides:[
"Negative numbers are below zero.",
"Example:<br>-5 is less than 0.",
"They are used for temperatures and money."
]
},

{
title:"Ratios",
slides:[
"Ratios compare amounts.",
"Example:<br>2:3 compares two groups.",
"Ratios can be simplified like fractions."
]
},

{
title:"Sequences",
slides:[
"A sequence is a list following a rule.",
"Example:<br>5,10,15,20",
"The rule is adding 5."
]
},

{
title:"Exponents",
slides:[
"Exponents show repeated multiplication.",
"Example:<br>2³ = 2×2×2",
"The small number is called the power."
]
},

{
title:"Square Roots",
slides:[
"Square roots undo squaring.",
"Example:<br>√25 = 5",
"5×5 gives 25."
]
},

{
title:"Pythagoras",
slides:[
"Pythagoras helps find missing triangle sides.",
"Formula:<br>a²+b²=c²",
"Only works for right-angle triangles."
]
},

{
title:"Volume",
slides:[
"Volume measures 3D space.",
"Cube formula:<br>side × side × side",
"Volume uses cubic units."
]
},

{
title:"Linear Maths",
slides:[
"Linear equations make straight lines.",
"They often use y = mx + b.",
"The slope shows how fast something changes."
]
},

{
title:"Functions",
slides:[
"Functions turn inputs into outputs.",
"Example:<br>Input → Rule → Output",
"They are used in advanced maths."
]
},

{
title:"Advanced Algebra",
slides:[
"Advanced algebra uses more complex equations.",
"You may need multiple steps.",
"Keep working carefully one step at a time."
]
},

{
title:"Problem Solving",
slides:[
"Good problem solving uses a plan.",
"1. Understand the question<br>2. Choose a method<br>3. Solve<br>4. Check",
"Practice makes you faster and more accurate."
]
}

];

</script>
<script>

let currentLesson = 0;
let currentSlide = 0;


// Load saved progress

if(localStorage.getItem("mathLesson")){
    currentLesson = Number(localStorage.getItem("mathLesson"));
}

if(localStorage.getItem("mathLevel")){
    document.getElementById("level").value =
    localStorage.getItem("mathLevel");
}


// Update level display

function updateLevel(){

    let level =
    document.getElementById("level").value;

    let text =
    document.getElementById("levelText");


    if(level=="beginner"){
        text.innerHTML="🟢 Beginner Mode";
    }

    if(level=="intermediate"){
        text.innerHTML="🟡 Intermediate Mode";
    }

    if(level=="advanced"){
        text.innerHTML="🔴 Advanced Mode";
    }


    localStorage.setItem("mathLevel",level);
}


document
.getElementById("level")
.addEventListener("change",updateLevel);



// Display lesson

function loadLesson(){


let lesson = lessons[currentLesson];


document.getElementById("lessonTitle")
.innerHTML =
"Lesson "
+(currentLesson+1)
+": "
+lesson.title;



document.getElementById("slideContent")
.innerHTML =
lesson.slides[currentSlide];



document.getElementById("progress")
.innerHTML =
"Lesson "
+(currentLesson+1)
+" / "
+lessons.length
+
" &nbsp; | &nbsp; Slide "
+(currentSlide+1)
+" / 3";



localStorage.setItem(
"mathLesson",
currentLesson
);


}




// Next button

function nextSlide(){


currentSlide++;


if(currentSlide >= 3){

currentSlide=0;

currentLesson++;


if(currentLesson >= lessons.length){

currentLesson=0;

}

}


loadLesson();

}




// Previous button

function previousSlide(){


currentSlide--;


if(currentSlide < 0){

currentSlide=2;

currentLesson--;


if(currentLesson < 0){

currentLesson =
lessons.length-1;

}

}


loadLesson();

}




// Start page

updateLevel();

loadLesson();


</script>


</body>
</html>
