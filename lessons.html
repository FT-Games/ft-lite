<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Totally Math Lessons</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:linear-gradient(135deg,#fffbd6,#ffe0a3);
color:#4b3000;
}


header{
text-align:center;
padding:30px;
}


header h1{
font-size:45px;
margin:0;
background:linear-gradient(90deg,#ff9800,#ff6f00);
-webkit-background-clip:text;
color:transparent;
}


.container{
max-width:950px;
margin:auto;
padding:20px;
}


.card{
background:white;
padding:35px;
border-radius:30px;
box-shadow:0 15px 40px #0003;
}


select{
width:100%;
padding:15px;
border-radius:15px;
border:2px solid #ffb300;
font-size:18px;
background:#fff8dc;
}


h2{
color:#ff8c00;
}


.slide{
background:#fff8e7;
border:3px solid #ffd166;
border-radius:25px;
padding:30px;
font-size:20px;
line-height:1.6;
min-height:220px;
}


button{

padding:15px;
border:0;
border-radius:18px;
background:#ffb300;
color:white;
font-size:18px;
cursor:pointer;
flex:1;

}


button:hover{
background:#ff8500;
}


.buttons{
display:flex;
gap:15px;
margin-top:20px;
}


.badge{

display:inline-block;
background:#ffe082;
padding:10px 20px;
border-radius:20px;

}


.progress{

text-align:center;
font-weight:bold;
margin-top:20px;

}


</style>

</head>


<body>


<header>

<h1>📚 Totally Math Lessons</h1>

<p>Learn maths with interactive lessons!</p>

</header>



<div class="container">

<div class="card">


<h2>Choose Lesson</h2>

<select id="lessonSelect" onchange="changeLesson()">

</select>



<h2>Choose Skill Level</h2>

<select id="level" onchange="changeLevel()">

<option value="beginner">
🟢 Beginner
</option>

<option value="intermediate">
🟡 Intermediate
</option>

<option value="advanced">
🔴 Advanced
</option>

</select>



<br><br>


<div class="badge" id="levelText">
Beginner Mode
</div>


<h2 id="title">
Loading...
</h2>


<div class="slide" id="content">

Loading...

</div>


<div class="progress" id="progress">

</div>


<div class="buttons">

<button onclick="previousSlide()">
⬅ Previous
</button>


<button onclick="nextSlide()">
Next ➡
</button>


</div>


</div>

</div>



<script>


const lessons=[

{
title:"Numbers",
slides:{
beginner:[
"Numbers are used for counting.",
"Example: 123 has hundreds, tens and ones.",
"Try counting objects around you."
],
intermediate:[
"Place value helps us understand numbers.",
"Example: 542 = 500 + 40 + 2",
"Expanded form shows each value."
],
advanced:[
"Numbers can include decimals and large values.",
"Example: 45.67",
"Decimals have tenths and hundredths."
]
}
},


{
title:"Addition",
slides:{
beginner:[
"Addition means putting things together.",
"Example: 3 + 2 = 5",
"Adding makes numbers bigger."
],
intermediate:[
"Large addition uses carrying.",
"Line up place values.",
"Check your answer."
],
advanced:[
"Addition can include decimals and algebra.",
"Always keep values aligned.",
"Estimate to check answers."
]
}
},


{
title:"Subtraction",
slides:{
beginner:[
"Subtraction means taking away.",
"Example: 8 - 3 = 5",
"The answer is the difference."
],
intermediate:[
"Borrowing helps subtract larger numbers.",
"Work from right to left.",
"Check using addition."
],
advanced:[
"Subtraction works with negative numbers.",
"Remember signs carefully.",
"Use inverse operations."
]
}
},


{
title:"Multiplication",
slides:{
beginner:[
"Multiplication is repeated addition.",
"Example: 4 × 3 = 12",
"Learn times tables."
],
intermediate:[
"Multiply larger numbers using methods.",
"Break numbers apart.",
"Practice makes it faster."
],
advanced:[
"Multiplication is used in algebra.",
"Powers are repeated multiplication.",
"Look for patterns."
]
}
},


{
title:"Division",
slides:{
beginner:[
"Division shares things equally.",
"Example: 12 ÷ 3 = 4",
"Division is sharing."
],
intermediate:[
"Division can have remainders.",
"Check using multiplication.",
"Work carefully."
],
advanced:[
"Division can use fractions.",
"Decimals may appear.",
"Use correct formulas."
]
}
},
{
title:"Fractions",
slides:{
beginner:[
"Fractions show parts of a whole.",
"Example: 1/2 means one half.",
"Fractions have a top and bottom number."
],
intermediate:[
"Fractions can be simplified.",
"Example: 2/4 = 1/2",
"Find common denominators."
],
advanced:[
"Fractions are used in algebra.",
"Convert between fractions and decimals.",
"Use fraction rules carefully."
]
}
},


{
title:"Decimals",
slides:{
beginner:[
"Decimals show parts of numbers.",
"Example: 0.5 means half.",
"Decimals use place value."
],
intermediate:[
"Decimals can be added and multiplied.",
"Line up decimal points.",
"Example: 2.5 + 1.2"
],
advanced:[
"Decimals can represent precise values.",
"Use rounding and estimation.",
"Decimals connect with percentages."
]
}
},


{
title:"Percentages",
slides:{
beginner:[
"Percent means out of 100.",
"Example: 50% = 50/100.",
"Percentages show parts."
],
intermediate:[
"Percentages can become decimals.",
"Example: 25% = 0.25",
"Useful for discounts."
],
advanced:[
"Percentage change compares values.",
"Used in finance and statistics.",
"Formula: change ÷ original × 100."
]
}
},


{
title:"Geometry",
slides:{
beginner:[
"Geometry studies shapes.",
"Shapes have sides and corners.",
"Examples are circles and triangles."
],
intermediate:[
"Geometry uses measurements.",
"Angles and lengths matter.",
"Learn shape formulas."
],
advanced:[
"Advanced geometry uses proofs.",
"Shapes can be transformed.",
"Used in engineering."
]
}
},


{
title:"Algebra",
slides:{
beginner:[
"Algebra uses letters for numbers.",
"Example: x + 2 = 5.",
"Find what x means."
],
intermediate:[
"Algebra uses multiple steps.",
"Example: 2x + 4 = 10.",
"Undo operations to solve."
],
advanced:[
"Advanced algebra solves complex equations.",
"Variables can represent many values.",
"Follow algebra rules."
]
}
},


{
title:"Problem Solving",
slides:{
beginner:[
"Read the question carefully.",
"Choose what operation to use.",
"Check your answer."
],
intermediate:[
"Break problems into steps.",
"Look for patterns.",
"Explain your method."
],
advanced:[
"Complex problems require strategy.",
"Test different methods.",
"Always verify results."
]
}
}


];



// VARIABLES

let currentLesson=0;
let currentSlide=0;
let level="beginner";



// CREATE LESSON MENU

function createMenu(){

let menu=document.getElementById("lessonSelect");

lessons.forEach((lesson,index)=>{

let option=document.createElement("option");

option.value=index;

option.textContent=
(index+1)+". "+lesson.title;

menu.appendChild(option);

});

}




// CHANGE LESSON

function changeLesson(){

currentLesson=
Number(
document.getElementById("lessonSelect").value
);

currentSlide=0;

showLesson();

}




// CHANGE LEVEL

function changeLevel(){

level=
document.getElementById("level").value;

document.getElementById("levelText").textContent=
document.getElementById("level")
.options[
document.getElementById("level").selectedIndex
].text;


localStorage.setItem("level",level);

currentSlide=0;

showLesson();

}





// SHOW LESSON

function showLesson(){

let lesson=lessons[currentLesson];

let slides=
lesson.slides[level];


document.getElementById("title").innerHTML=
"Lesson "+(currentLesson+1)+": "+lesson.title;


document.getElementById("content").innerHTML=
slides[currentSlide];


document.getElementById("progress").innerHTML=
"Lesson "
+(currentLesson+1)
+" / "
+lessons.length
+
" | Slide "
+(currentSlide+1)
+" / "
+slides.length;


}




// NEXT

function nextSlide(){

let slides=
lessons[currentLesson].slides[level];


currentSlide++;


if(currentSlide>=slides.length){

currentSlide=0;

currentLesson++;

if(currentLesson>=lessons.length){

currentLesson=0;

}

document.getElementById("lessonSelect").value=currentLesson;

}


showLesson();

}




// PREVIOUS

function previousSlide(){

currentSlide--;


if(currentSlide<0){

currentLesson--;

if(currentLesson<0){

currentLesson=lessons.length-1;

}

currentSlide=
lessons[currentLesson]
.slides[level]
.length-1;


document.getElementById("lessonSelect").value=currentLesson;

}


showLesson();

}




// LOAD SAVED SETTINGS

if(localStorage.getItem("level")){

level=localStorage.getItem("level");

document.getElementById("level").value=level;

}



// START

createMenu();

showLesson();


</script>

</body>
</html>
