<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Totally Math Lessons</title>


<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}


body{

font-family:"Segoe UI",Arial,sans-serif;

background:linear-gradient(
135deg,
#fffbd6,
#ffe0a3
);

color:#4b3000;

}



header{

text-align:center;

padding:35px;

}



header h1{

font-size:50px;

background:linear-gradient(
90deg,
#ff9800,
#ffb300,
#ff6f00
);

-webkit-background-clip:text;

color:transparent;

}



header p{

font-size:20px;

}



.home-button{

position:absolute;

top:20px;

left:20px;

background:#ffb300;

color:white;

text-decoration:none;

padding:12px 20px;

border-radius:25px;

font-weight:bold;

}



.home-button:hover{

background:#ff8500;

}



.container{

max-width:1200px;

margin:auto;

padding:25px;

}



.box{

background:white;

border-radius:30px;

padding:35px;

box-shadow:
0 15px 40px rgba(0,0,0,.15);

}



h2{

color:#ff8500;

margin-bottom:25px;

}



.lesson-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(230px,1fr));

gap:25px;

}



.lesson-card{

background:#fff8e7;

border:3px solid #ffd166;

border-radius:25px;

padding:25px;

cursor:pointer;

transition:.2s;

}



.lesson-card:hover{

transform:translateY(-8px);

background:#fff0c2;

}



.lesson-card h3{

color:#ff8500;

margin-bottom:10px;

}



.hidden{

display:none;

}



.level-buttons{

display:flex;

gap:20px;

flex-wrap:wrap;

}



.level-button{

flex:1;

padding:25px;

background:#ffb300;

border:none;

border-radius:25px;

color:white;

font-size:22px;

cursor:pointer;

}



.level-button:hover{

background:#ff8500;

}



.slide-box{

background:#fff8e7;

border:3px solid #ffd166;

border-radius:25px;

padding:35px;

font-size:21px;

line-height:1.7;

min-height:300px;

}



.controls{

display:flex;

gap:20px;

margin-top:25px;

}



button{

background:#ffb300;

color:white;

border:none;

padding:15px;

border-radius:20px;

font-size:18px;

cursor:pointer;

}



button:hover{

background:#ff8500;

}



.progress{

text-align:center;

margin-top:20px;

font-weight:bold;

}



</style>

</head>


<body>


<a class="home-button" href="index.html">

🏠 Homepage

</a>



<header>

<h1>📚 Totally Math Lessons</h1>

<p>Master maths step by step!</p>

</header>



<div class="container">

<div class="box">



<div id="lessonPage">


<h2>📖 Choose a Lesson</h2>


<div class="lesson-grid" id="lessonCards">

</div>


</div>





<div id="levelPage" class="hidden">


<h2 id="chosenLesson">

</h2>


<h2>

Choose your skill level

</h2>



<div class="level-buttons">


<button class="level-button"
onclick="startLesson('beginner')">

🟢 Beginner

</button>


<button class="level-button"
onclick="startLesson('intermediate')">

🟡 Intermediate

</button>


<button class="level-button"
onclick="startLesson('advanced')">

🔴 Advanced

</button>


</div>


<br>


<button onclick="backLessons()">

⬅ Back

</button>


</div>





<div id="lessonView" class="hidden">


<h2 id="lessonTitle"></h2>


<div class="slide-box" id="slideContent">

</div>


<div class="progress" id="progress">

</div>



<div class="controls">


<button onclick="previousSlide()">

⬅ Previous

</button>


<button onclick="nextSlide()">

Next ➡

</button>


</div>


</div>

let chosen=0;

let level="beginner";

let slide=0;



const cards=document.getElementById("lessonCards");


lessons.forEach((lesson,index)=>{


let card=document.createElement("div");


card.className="lesson-card";


card.innerHTML=
`
<h3>${lesson.title}</h3>
<p>${lesson.desc}</p>
`;


card.onclick=function(){

chosen=index;


document.getElementById("lessonPage").classList.add("hidden");

document.getElementById("levelPage").classList.remove("hidden");


document.getElementById("chosenLesson").innerHTML=
lesson.title;

};


cards.appendChild(card);


});



function startLesson(selectedLevel){

level=selectedLevel;

slide=0;


document.getElementById("levelPage").classList.add("hidden");

document.getElementById("lessonView").classList.remove("hidden");


showSlide();

}



function showSlide(){

let lesson=lessons[chosen];

let slides=lesson.slides[level];


document.getElementById("lessonTitle").innerHTML=
lesson.title+" - "+level;


document.getElementById("slideContent").innerHTML=
slides[slide];


document.getElementById("progress").innerHTML=
"Slide "+(slide+1)+" / "+slides.length;

}



function nextSlide(){

slide++;


let slides=lessons[chosen].slides[level];


if(slide>=slides.length){

slide=0;

}


showSlide();

}



function previousSlide(){

slide--;


let slides=lessons[chosen].slides[level];


if(slide<0){

slide=slides.length-1;

}


showSlide();

}



function backLessons(){

document.getElementById("levelPage").classList.add("hidden");

document.getElementById("lessonPage").classList.remove("hidden");

}


</script>

</body>
</html>
