<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lessons - Totally Math</title>

<link rel="icon" type="image/png" href="images/favicon.png">


<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",Arial,sans-serif;
}


body{

margin:0;

background:#fffbea;

color:#333;

}


header{

background:linear-gradient(135deg,#fff5b8,#ffd27f);

padding:35px;

text-align:center;

border-bottom:5px solid #ffb347;

}


.logo{

position:absolute;

left:20px;

top:20px;

width:65px;

border-radius:50%;

}


header h1{

font-size:45px;

color:#ff8c00;

margin:10px;

}


header p{

font-size:20px;

}



.container{

max-width:1100px;

margin:auto;

padding:30px;

}



.box{

background:white;

border-radius:25px;

padding:30px;

margin-bottom:25px;

box-shadow:0 5px 25px rgba(0,0,0,.12);

text-align:center;

}



button{

background:#ffb347;

border:none;

padding:15px 25px;

border-radius:15px;

font-size:18px;

cursor:pointer;

margin:8px;

transition:.2s;

}


button:hover{

transform:scale(1.08);

background:#ff9f1c;

}



.lesson-card{

background:#fff3c4;

padding:20px;

border-radius:20px;

margin:15px 0;

cursor:pointer;

font-size:20px;

transition:.2s;

}


.lesson-card:hover{

transform:translateY(-5px);

background:#ffe69c;

}



.lesson{

background:white;

padding:30px;

border-radius:25px;

box-shadow:0 5px 25px rgba(0,0,0,.15);

animation:fade .4s;

}


@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}



.slide{

display:none;

min-height:250px;

}


.slide.active{

display:block;

}


.slide h2{

color:#ff8c00;

font-size:32px;

}


.slide p{

font-size:22px;

line-height:1.6;

}



.progress{

height:15px;

background:#eee;

border-radius:20px;

overflow:hidden;

}


.progress-bar{

height:100%;

width:0%;

background:#ffb347;

transition:.3s;

}



.xp{

background:#fff3c4;

padding:20px;

border-radius:20px;

font-size:22px;

font-weight:bold;

color:#ff8c00;

}



</style>

</head>


<body>


<header>


<img src="images/favicon.png" class="logo">


<h1>📚 Totally Math Lessons</h1>

<p>Learn maths step by step!</p>


</header>



<div class="container">



<div class="box">


<h2>Choose Your Level</h2>


<button onclick="loadLevel('beginner')">
🟢 Beginner
</button>


<button onclick="loadLevel('intermediate')">
🟡 Intermediate
</button>


<button onclick="loadLevel('advanced')">
🔴 Advanced
</button>


</div>




<div class="xp">

⭐ XP: <span id="xp">0</span>

</div>



<div id="lessons"></div>



<div id="lessonArea"></div>



<script>



let currentSlide=0;

let slides=[];

let xp=localStorage.getItem("mathXP") || 0;


document.getElementById("xp").innerHTML=xp;



const lessons={



beginner:[


{
title:"Lesson 1: Numbers",

slides:[

["Numbers","Numbers are used for counting and measuring."],

["Whole Numbers","Examples: 1,2,3,4,5..."],

["Number Lines","Numbers increase when moving right."],

["Practice","What comes after 9? Answer: 10"]

]

},



{
title:"Lesson 2: Addition",

slides:[

["Adding","Addition joins groups together."],

["Example","3 + 2 means 3 objects plus 2 more."],

["Number Lines","Move forwards to add."],

["Practice","5 + 4 = 9"]

]

},



{
title:"Lesson 3: Subtraction",

slides:[

["Subtracting","Subtraction removes amounts."],

["Example","8 - 3 means remove 3."],

["Number Lines","Move backwards."],

["Practice","10 - 5 = 5"]

]

},



{
title:"Lesson 4: Multiplication",

slides:[

["Multiplication","Multiplication is repeated addition."],

["Example","4 × 3 means 4 groups of 3."],

["Arrays","Rows and columns show multiplication."],

["Practice","5 × 2 = 10"]

]

},



{
title:"Lesson 5: Division",

slides:[

["Division","Division shares equally."],

["Example","12 ÷ 3 means split into 3 groups."],

["Remember","Division is the opposite of multiplication."],

["Practice","20 ÷ 4 = 5"]

]

},

// CONTINUING BEGINNER LESSONS


{
title:"Lesson 6: Shapes",

slides:[

["Shapes","Shapes have different properties."],

["2D Shapes","Squares, circles and triangles are flat shapes."],

["3D Shapes","Cubes and spheres have volume."],

["Practice","A triangle has 3 sides."]

]

},


{
title:"Lesson 7: Time",

slides:[

["Reading Time","Clocks measure hours and minutes."],

["Minutes","60 minutes equals 1 hour."],

["Hours","24 hours equals 1 day."],

["Practice","Half past 3 is 3:30."]

]

},


{
title:"Lesson 8: Money",

slides:[

["Money Maths","Money uses decimals."],

["Coins","Coins have different values."],

["Adding Money","Always line up decimal points."],

["Practice","$5 + $2 = $7"]

]

},


{
title:"Lesson 9: Measurement",

slides:[

["Measurement","We measure length, mass and volume."],

["Length","Metres and centimetres measure distance."],

["Mass","Grams and kilograms measure weight."],

["Volume","Litres measure liquids."]

]

},


{
title:"Lesson 10: Patterns",

slides:[

["Patterns","Patterns follow rules."],

["Number Patterns","2,4,6,8 follows +2."],

["Finding Rules","Look at how numbers change."],

["Practice","10,20,30,40..."]

]

}

],



// INTERMEDIATE LEVEL


intermediate:[


{
title:"Lesson 1: Fractions",

slides:[

["Fractions","Fractions show parts of a whole."],

["Numerator","The top number shows parts taken."],

["Denominator","The bottom number shows total parts."],

["Example","1/4 means one of four parts."]

]

},



{
title:"Lesson 2: Decimals",

slides:[

["Decimals","Decimals show parts of numbers."],

["Place Value","Tenths, hundredths and thousandths."],

["Example","0.5 is half."],

["Practice","0.25 = 25/100"]

]

},



{
title:"Lesson 3: Percentages",

slides:[

["Percent","Percent means out of 100."],

["Example","50% means 50 out of 100."],

["Converting","50% = 0.5"],

["Practice","25% = 25/100"]

]

},



{
title:"Lesson 4: Ratios",

slides:[

["Ratios","Ratios compare amounts."],

["Example","2:3 compares two amounts."],

["Simplifying","Divide both numbers equally."],

["Practice","4:8 becomes 1:2"]

]

},



{
title:"Lesson 5: Speed",

slides:[

["Speed","Speed measures movement."],

["Formula","Speed = Distance ÷ Time"],

["Example","100km in 2 hours = 50km/h"],

["Remember","Always include units."]

]

},



{
title:"Lesson 6: Angles",

slides:[

["Angles","Angles measure turns."],

["Acute","Less than 90 degrees."],

["Right Angle","Exactly 90 degrees."],

["Obtuse","More than 90 degrees."]

]

},



{
title:"Lesson 7: Integers",

slides:[

["Integers","Integers include negative numbers."],

["Examples","-5,-4,-3,0,1,2"],

["Number Lines","Negative numbers are left of zero."],

["Practice","-5 + 10 = 5"]

]

},



{
title:"Lesson 8: Formulas",

slides:[

["Formulas","Formulas are maths rules."],

["Example","Area = length × width"],

["Substitution","Replace letters with numbers."],

["Practice","Use the correct formula."]

]

},



// ADVANCED LEVEL


advanced:[


{
title:"Lesson 1: Algebra",

slides:[

["Variables","Letters can represent unknown numbers."],

["Example","x + 5 = 10"],

["Solving","Subtract 5 from both sides."],

["Answer","x = 5"]

]

},



{
title:"Lesson 2: Equations",

slides:[

["Equations","Both sides must remain equal."],

["Rule","Do the same thing to both sides."],

["Example","3x = 15"],

["Answer","x = 5"]

]

},



{
title:"Lesson 3: Geometry",

slides:[

["Geometry","Geometry studies shapes and space."],

["Angles","Angles are measured in degrees."],

["Triangles","Triangles have 180° total."],

["Practice","Squares have four 90° angles."]

]

},



{
title:"Lesson 4: Area",

slides:[

["Area","Area measures inside space."],

["Rectangle","Length × Width"],

["Example","5 × 4 = 20"],

["Units","Square units are used."]

]

},



{
title:"Lesson 5: Volume",

slides:[

["Volume","Volume measures 3D space."],

["Formula","Length × Width × Height"],

["Example","2×3×4 = 24"],

["Units","Cubic units."]

]

},



// FINISH ADVANCED LESSONS


{
title:"Lesson 6: Probability",

slides:[

["Probability","Probability measures chance."],

["Scale","0 means impossible, 1 means certain."],

["Example","A coin flip has a 1/2 chance."],

["Practice","A dice roll has a 1/6 chance for each number."]

]

},


{
title:"Lesson 7: Statistics",

slides:[

["Statistics","Statistics studies information and data."],

["Mean","Add numbers and divide by how many numbers."],

["Median","The middle number."],

["Mode","The most common number."]

]

},


{
title:"Lesson 8: Graphs",

slides:[

["Graphs","Graphs show information visually."],

["Bar Graphs","Compare amounts."],

["Line Graphs","Show change over time."],

["Pie Charts","Show parts of a whole."]

]

},


{
title:"Lesson 9: Square Numbers",

slides:[

["Squares","A number multiplied by itself."],

["Example","5² = 25"],

["Pattern","1,4,9,16,25..."],

["Tip","Learn common squares."]

]

},


{
title:"Lesson 10: Square Roots",

slides:[

["Square Roots","The opposite of squaring."],

["Example","√25 = 5"],

["Reason","5 × 5 = 25"],

["Practice","√64 = 8"]

]

}


]

};



// LOAD LEVEL


function loadLevel(level){


let area=document.getElementById("lessons");


area.innerHTML="<h2>"+level.toUpperCase()+" LESSONS</h2>";


lessons[level].forEach(function(lesson){


let card=document.createElement("div");


card.className="lesson-card";


card.innerHTML="📘 "+lesson.title;


card.onclick=function(){

openLesson(lesson);

};


area.appendChild(card);


});


}



// OPEN LESSON


function openLesson(lesson){


let box=document.getElementById("lessonArea");


let html=`


<div class="lesson">


<h1>${lesson.title}</h1>


<div class="progress">

<div class="progress-bar" id="bar"></div>

</div>


`;


slides=lesson.slides;


slides.forEach(function(slide,index){


html+=`


<div class="slide ${index===0?"active":""}">


<h2>${slide[0]}</h2>


<p>${slide[1]}</p>


</div>


`;


});



html+=`


<button onclick="changeSlide(-1)">
⬅ Back
</button>


<button onclick="changeSlide(1)">
Next ➡
</button>


<button onclick="completeLesson()">
✅ Complete Lesson
</button>


</div>


`;



box.innerHTML=html;


currentSlide=0;


updateProgress();


}



// CHANGE SLIDE


function changeSlide(amount){


let allSlides=document.querySelectorAll(".slide");


allSlides[currentSlide].classList.remove("active");


currentSlide+=amount;



if(currentSlide<0){

currentSlide=0;

}



if(currentSlide>=allSlides.length){

currentSlide=allSlides.length-1;

}



allSlides[currentSlide].classList.add("active");


updateProgress();


}



// PROGRESS BAR


function updateProgress(){


let bar=document.getElementById("bar");


if(bar){


bar.style.width=
((currentSlide+1)/slides.length*100)+"%";


}


}



// XP SYSTEM


function completeLesson(){


xp++;


localStorage.setItem("mathXP",xp);


document.getElementById("xp").innerHTML=xp;


alert("🎉 Lesson Completed! +1 XP");


}



</script>


</body>

</html>
