<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Totally Math Lessons</title>


<style>

*{
box-sizing:border-box;
}


body{
margin:0;
font-family:"Segoe UI",Arial,sans-serif;
background:linear-gradient(135deg,#fffbd6,#ffe0a3);
color:#4b3000;
}


header{
text-align:center;
padding:35px 20px;
}


header h1{
font-size:48px;
margin:0;

background:linear-gradient(
90deg,
#ff9800,
#ffb300,
#ff6f00
);

-webkit-background-clip:text;
color:transparent;
}


header p{
font-size:20px;
}


.container{

max-width:1100px;
margin:auto;
padding:20px;

}


.box{

background:white;
border-radius:30px;
padding:35px;
box-shadow:0 15px 40px rgba(0,0,0,.15);

}



h2{
color:#ff8500;
}



.lesson-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

}



.lesson-card{

background:#fff8e7;

border:3px solid #ffd166;

border-radius:25px;

padding:25px;

text-align:center;

cursor:pointer;

transition:.2s;

}



.lesson-card:hover{

transform:translateY(-8px);

background:#fff0c2;

}



.lesson-card h3{

color:#ff8500;

font-size:24px;

}



.lesson-card p{

font-size:16px;

}



.level-buttons{

display:flex;

gap:20px;

flex-wrap:wrap;

}



.level-button{

flex:1;

min-width:200px;

padding:25px;

border:none;

border-radius:25px;

font-size:22px;

background:#ffb300;

color:white;

cursor:pointer;

}



.level-button:hover{

background:#ff8500;

}



.slide-box{

background:#fff8e7;

border:3px solid #ffd166;

border-radius:25px;

padding:30px;

font-size:20px;

line-height:1.6;

min-height:250px;

}



.controls{

display:flex;

gap:15px;

margin-top:25px;

}



button{

padding:15px;

border:none;

border-radius:18px;

background:#ffb300;

color:white;

font-size:18px;

cursor:pointer;

flex:1;

}


button:hover{

background:#ff8500;

}



.progress{

text-align:center;

font-weight:bold;

margin-top:20px;

}



.hidden{

display:none;

}



@media(max-width:600px){

header h1{

font-size:36px;

}

.controls{

flex-direction:column;

}

}



</style>


</head>



<body>


<header>

<h1>📚 Totally Math Lessons</h1>

<p>Choose a lesson and master maths!</p>

</header>



<div class="container">

<div class="box">



<!-- LESSON CARDS -->


<div id="lessonPage">


<h2>📖 Choose a Lesson</h2>


<div class="lesson-grid" id="lessonCards">

</div>


</div>





<!-- SKILL LEVEL -->


<div id="levelPage" class="hidden">


<h2 id="levelTitle">

Choose Skill Level

</h2>


<p>
Choose your difficulty:
</p>



<div class="level-buttons">


<button class="level-button"
onclick="startLesson('beginner')">

🟢 Beginner

</button>



<button class="level-button"
onclick="startLesson('intermediate')">

🟡 Intermediate

</button>



<button class="level-button"
onclick="startLesson('advanced')">

🔴 Advanced

</button>


</div>


<br>


<button onclick="backLessons()">

⬅ Back

</button>


</div>






<!-- LESSON VIEW -->


<div id="lessonView" class="hidden">


<h2 id="lessonTitle"></h2>


<div class="slide-box" id="slide">

</div>


<div class="progress" id="progress">

</div>


<div class="controls">


<button onclick="previousSlide()">

⬅ Previous

</button>


<button onclick="nextSlide()">

Next ➡

</button>


</div>



</div>



</div>

</div>




<script>

"Compare numbers using place value."
],

advanced:[

"Large values use powers of ten.",
"Use estimation to check answers."
]
}

},



{

desc:"Learn adding numbers",
slides:{
beginner:[
"Addition joins groups together.",
"Example: 3 + 2 = 5",
"Adding increases a number."
],

intermediate:[

"Line up place values.",
"Check your answer."
],

advanced:[
"Addition works with decimals and algebra.",
"Use inverse operations.",
"Find efficient methods."
]
}

},



{

"The answer is the difference."
],

intermediate:[

"Work right to left.",
"Check using addition."
],

advanced:[
"Negative numbers use subtraction.",
"Algebra uses subtraction rules.",
"Watch signs carefully."
]
}

},
{

title:"✖ Multiplication",
desc:"Learn times tables",

slides:{

beginner:[
"Multiplication is repeated addition.",
"Example: 4 × 3 = 12.",
"Learn your times tables."
],

intermediate:[
"Multiply larger numbers step by step.",
"Break numbers apart.",
"Practice improves speed."
],

advanced:[
"Multiplication connects with algebra.",
"Powers are repeated multiplication.",
"Use patterns to solve faster."
]

}

},


{

title:"➗ Division",

slides:{

beginner:[
"Division shares amounts equally.",
"Example: 12 ÷ 3 = 4.",
"Division is the opposite of multiplication."
],

intermediate:[
"Division can have remainders.",
"Use long division.",

],

advanced:[
"Division works with fractions and decimals.",
"Use inverse operations.",
"Solve carefully."
]

}

},


{

desc:"Parts of a whole",

slides:{

beginner:[
"Fractions show parts of something.",
"1/2 means one half.",

],

intermediate:[

"Find common denominators.",
"Add and subtract fractions."
],

advanced:[

"Convert between fractions and decimals.",
"Solve complex fraction problems."
]

}

},


{

title:"🔢 Decimals",
desc:"Numbers with decimal points",

slides:{

beginner:[
"Decimals show parts of numbers.",
"0.5 means half.",
"Decimals use place value."
],

intermediate:[
"Add and multiply decimals.",
"Line up decimal points.",
"Round answers."
],

advanced:[
"Decimals represent precision.",
"Use significant figures.",

]

}

},


{

title:"📊 Percentages",
desc:"Learn percentages",

slides:{

beginner:[
"Percent means out of 100.",
"50% means 50 out of 100.",

],

]

},

title:"📋 Statistics",

slides:{

intermediate:[
"Mean is the average.",

]

beginner:[

],

"Learn acute and obtuse angles.",

]

}

},


{

title:"📦 Area",
desc:"Space inside shapes",

slides:{

beginner:[
"Area measures inside a shape.",
"Rectangle = length × width.",
"Use square units."
],

intermediate:[
"Calculate areas of shapes.",
"Use formulas.",
"Compare sizes."
],

"Complex shapes use multiple formulas.",

"Solve real problems."
]

}

},


{

title:"🟦 Perimeter",

slides:{

],

],

],

},


{

title:"🧠 Problem Solving",
desc:"Solve maths challenges",

slides:{

beginner:[
"Read the problem.",
"Choose an operation.",
"Check your answer."
],

"Find patterns.",
"Explain your thinking."
],

]

];



// VARIABLES

let selectedLesson=0;
let currentSlide=0;
let currentLevel="beginner";




// MAKE CARDS

function createCards(){

let box=document.getElementById("lessonCards");

lessons.forEach((lesson,index)=>{


let card=document.createElement("div");

card.className="lesson-card";


card.innerHTML=

"<h3>"+lesson.title+"</h3>"+
"<p>"+lesson.desc+"</p>";


card.onclick=function(){

selectedLesson=index;


document.getElementById("lessonPage").classList.add("hidden");

document.getElementById("levelPage").classList.remove("hidden");


document.getElementById("levelTitle").innerHTML=

lesson.title+"<br>Choose Skill Level";

};


box.appendChild(card);


});


}




function startLesson(level){

currentLevel=level;

currentSlide=0;


document.getElementById("levelPage").classList.add("hidden");

document.getElementById("lessonView").classList.remove("hidden");


showSlide();

}




function showSlide(){

let lesson=lessons[selectedLesson];

let slides=lesson.slides[currentLevel];


document.getElementById("lessonTitle").innerHTML=

lesson.title+" - "+currentLevel;


document.getElementById("slide").innerHTML=

slides[currentSlide];


document.getElementById("progress").innerHTML=

"Slide "+(currentSlide+1)+" / "+slides.length;

}




function nextSlide(){

let slides=
lessons[selectedLesson].slides[currentLevel];


currentSlide++;


if(currentSlide>=slides.length){

currentSlide=0;

}


showSlide();

}




function previousSlide(){

let slides=
lessons[selectedLesson].slides[currentLevel];


currentSlide--;


if(currentSlide<0){

currentSlide=slides.length-1;

}


showSlide();

}




function backLessons(){

document.getElementById("levelPage").classList.add("hidden");

document.getElementById("lessonPage").classList.remove("hidden");

}




createCards();


</script>


</body>

</html>
