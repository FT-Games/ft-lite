<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Totally Math Lessons</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
font-family:"Segoe UI",Arial,sans-serif;
background:linear-gradient(135deg,#fffbd6,#ffe0a3);
color:#4b3000;

}


header{

text-align:center;
padding:35px;

}


header h1{

font-size:48px;
margin:0;

background:linear-gradient(
90deg,
#ff9800,
#ffb300,
#ff6f00
);

-webkit-background-clip:text;
color:transparent;

}


header p{

font-size:20px;

}



.container{

max-width:1100px;
margin:auto;
padding:20px;

}



.card{

background:white;
border-radius:30px;
padding:35px;
box-shadow:0 15px 40px #0003;

}



h2{

color:#ff8c00;

}



/* LESSON CARDS */


.lesson-grid{

display:grid;
grid-template-columns:repeat(
auto-fit,
minmax(220px,1fr)
);

gap:20px;

}



.lesson-card{

background:#fff8e7;
border:3px solid #ffd166;
border-radius:25px;
padding:25px;

cursor:pointer;
transition:.25s;

text-align:center;

}



.lesson-card:hover{

transform:translateY(-8px);
background:#fff0c2;

}



.lesson-card h3{

color:#ff8500;
font-size:25px;

}



.lesson-card p{

font-size:16px;

}



/* LEVEL PAGE */


.level-buttons{

display:flex;
gap:20px;
flex-wrap:wrap;

}



.level-btn{

flex:1;
min-width:200px;

padding:25px;

border-radius:25px;
border:none;

font-size:22px;
cursor:pointer;

background:#ffb300;
color:white;

}



.level-btn:hover{

background:#ff8500;

}




/* LESSON VIEWER */


.slide-box{

background:#fff8e7;
border:3px solid #ffd166;

border-radius:25px;

padding:30px;

font-size:20px;

line-height:1.6;

min-height:250px;

}



.buttons{

display:flex;
gap:15px;
margin-top:25px;

}


button{

padding:15px;

border:none;

border-radius:18px;

background:#ffb300;

color:white;

font-size:18px;

cursor:pointer;

flex:1;

}


button:hover{

background:#ff8500;

}



.progress{

text-align:center;

font-weight:bold;

margin-top:20px;

}




.hidden{

display:none;

}




@media(max-width:600px){

header h1{

font-size:35px;

}


.level-buttons,
.buttons{

flex-direction:column;

}

}


</style>


</head>



<body>


<header>

<h1>📚 Totally Math Lessons</h1>

<p>Choose a lesson and start learning!</p>

</header>



<div class="container">



<div class="card">


<!-- LESSON SELECT PAGE -->


<div id="lessonPage">


<h2>
📖 Choose a Lesson
</h2>


<div class="lesson-grid" id="lessonCards">

</div>


</div>





<!-- LEVEL SELECT PAGE -->


<div id="levelPage" class="hidden">


<h2 id="selectedLesson">
Choose Skill Level
</h2>


<p>
Choose how difficult you want the lesson to be:
</p>



<div class="level-buttons">


<button class="level-btn"
onclick="startLesson('beginner')">

🟢 Beginner

</button>



<button class="level-btn"
onclick="startLesson('intermediate')">

🟡 Intermediate

</button>



<button class="level-btn"
onclick="startLesson('advanced')">

🔴 Advanced

</button>


</div>


<br>


<button onclick="backToLessons()">

⬅ Back to Lessons

</button>


</div>





<!-- LESSON VIEW PAGE -->


<div id="lessonView" class="hidden">


<h2 id="lessonTitle">

</h2>



<div class="slide-box" id="slideContent">

</div>



<div class="progress" id="progress">

</div>



<div class="buttons">


<button onclick="previousSlide()">

⬅ Previous

</button>


<button onclick="nextSlide()">

Next ➡

</button>


</div>


</div>



</div>

</div>



<script>
  const lessons=[


{
title:"🔢 Numbers",
desc:"Learn counting and place value",
slides:{
beginner:[
"Numbers help us count things.<br><br>Example: 1, 2, 3, 4",
"Place value tells us what digits mean.<br><br>In 542, the 5 means 500.",
"Try it:<br><br>What is the value of 7 in 7,321?"
],

intermediate:[
"Numbers can be expanded.<br><br>542 = 500 + 40 + 2",
"Large numbers use thousands and millions.",
"Practice writing numbers in expanded form."
],

advanced:[
"Numbers can include decimals and very large values.",
"Place value continues past the decimal point.",
"Use rounding and estimation to check answers."
]
}

},


{
title:"➕ Addition",
desc:"Learn how to add numbers",
slides:{
beginner:[
"Addition means putting groups together.",
"Example:<br><br>3 + 4 = 7",
"Adding makes numbers bigger."
],

intermediate:[
"Large addition uses carrying.",
"Line up place values carefully.",
"Check answers using estimation."
],

advanced:[
"Addition can include decimals and algebra.",
"Keep decimal points aligned.",
"Use inverse operations to check."
]
}

},


{
title:"➖ Subtraction",
desc:"Learn taking away",
slides:{
beginner:[
"Subtraction means taking away.",
"Example:<br><br>8 - 3 = 5",
"The answer is called the difference."
],

intermediate:[
"Borrowing helps subtract larger numbers.",
"Work from the right side.",
"Check with addition."
],

advanced:[
"Subtraction works with negative numbers.",
"Remember signs carefully.",
"Use algebra rules when needed."
]
}

},


{
title:"✖ Multiplication",
desc:"Learn times tables",
slides:{
beginner:[
"Multiplication is repeated addition.",
"Example:<br><br>4 × 3 = 12",
"Learn your times tables."
],

intermediate:[
"Multiply larger numbers step by step.",
"Break numbers apart to make it easier.",
"Practice improves speed."
],

advanced:[
"Multiplication connects with algebra.",
"Powers are repeated multiplication.",
"Look for patterns."
]
}

},


{
title:"➗ Division",
desc:"Learn sharing numbers",
slides:{
beginner:[
"Division shares things equally.",
"Example:<br><br>12 ÷ 3 = 4",
"Division is the opposite of multiplication."
],

intermediate:[
"Division can have remainders.",
"Example:<br><br>13 ÷ 4 = 3 remainder 1",
"Check using multiplication."
],

advanced:[
"Division can include fractions and decimals.",
"Use formulas carefully.",
"Check every step."
]
}

},


{
title:"📐 Geometry",
desc:"Learn shapes and angles",
slides:{
beginner:[
"Geometry studies shapes.",
"Shapes have sides and corners.",
"Examples are squares and triangles."
],

intermediate:[
"Geometry uses measurements.",
"Angles and lengths are important.",
"Learn shape formulas."
],

advanced:[
"Advanced geometry uses proofs.",
"Shapes can be transformed.",
"Used in engineering."
]
}

},


{
title:"🧩 Fractions",
desc:"Learn parts of wholes",
slides:{
beginner:[
"Fractions show parts of something.",
"Example:<br><br>1/2 means one half.",
"The top number is the numerator."
],

intermediate:[
"Fractions can be simplified.",
"Example:<br><br>2/4 = 1/2",
"Find common denominators."
],

advanced:[
"Fractions are used in algebra.",
"Convert fractions and decimals.",
"Use fraction rules."
]
}

},


{
title:"📊 Percentages",
desc:"Learn percentages",
slides:{
beginner:[
"Percent means out of 100.",
"Example:<br><br>50% = 50/100",
"Percent shows part of a whole."
],

intermediate:[
"Percentages become decimals.",
"Example:<br><br>25% = 0.25",
"Useful for discounts."
],

advanced:[
"Percentage change compares values.",
"Used in statistics and finance.",
"Formula: change ÷ original × 100."
]
}

}


];



let selectedLesson=0;
let currentSlide=0;
let currentLevel="beginner";




// CREATE LESSON CARDS

function createCards(){

let box=document.getElementById("lessonCards");

box.innerHTML="";


lessons.forEach((lesson,index)=>{


let card=document.createElement("div");

card.className="lesson-card";


card.innerHTML=
"<h3>"+lesson.title+"</h3>"+
"<p>"+lesson.desc+"</p>";


card.onclick=function(){

selectedLesson=index;

document.getElementById("lessonPage").classList.add("hidden");

document.getElementById("levelPage").classList.remove("hidden");


document.getElementById("selectedLesson").innerHTML=
lesson.title+"<br>Choose Skill Level";


};


box.appendChild(card);


});


}




// START LESSON

function startLesson(level){

currentLevel=level;

currentSlide=0;


document.getElementById("levelPage").classList.add("hidden");

document.getElementById("lessonView").classList.remove("hidden");


showSlide();

}



// SHOW SLIDE

function showSlide(){

let lesson=lessons[selectedLesson];

let slides=lesson.slides[currentLevel];


document.getElementById("lessonTitle").innerHTML=
lesson.title+" - "+currentLevel;



document.getElementById("slideContent").innerHTML=
slides[currentSlide];



document.getElementById("progress").innerHTML=
"Slide "+(currentSlide+1)+" / "+slides.length;


}




// NEXT

function nextSlide(){

let slides=
lessons[selectedLesson]
.slides[currentLevel];


currentSlide++;


if(currentSlide>=slides.length){

currentSlide=0;

}


showSlide();

}




// PREVIOUS

function previousSlide(){

let slides=
lessons[selectedLesson]
.slides[currentLevel];


currentSlide--;


if(currentSlide<0){

currentSlide=slides.length-1;

}


showSlide();

}




// BACK

function backToLessons(){

document.getElementById("levelPage").classList.add("hidden");

document.getElementById("lessonPage").classList.remove("hidden");

}



// START

createCards();


</script>


</body>

</html>
